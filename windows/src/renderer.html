<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaudePet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="dialogue" class="dialogue hidden"></div>
    <div id="hud" class="hud hidden">
      <section class="hud-section">
        <div class="hud-row">
          <div class="hud-label-group">
            <span>호감도</span>
            <strong id="affinity">Lv.1</strong>
          </div>
          <strong id="affinityExp">0 / 20</strong>
        </div>
        <div class="bar affinity"><i id="affinityBar"></i></div>
      </section>

      <div class="hud-divider"></div>

      <section class="hud-section hunger-section">
        <div class="hud-row">
          <div class="hud-label-group">
            <span>배고픔</span>
            <button id="feedButton" class="feed">밥주기</button>
          </div>
          <strong id="hungerText">100 / 100</strong>
        </div>
        <div class="bar hunger"><i id="hungerBar"></i></div>
      </section>
    </div>

    <main id="stage">
      <div id="counter">0</div>
      <img id="heart" src="" alt="" />
      <div id="spriteWrap">
        <img id="sprite" draggable="false" alt="ClaudePet" />
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
