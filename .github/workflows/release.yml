name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "рЯПЈпЄП  Releasing version: $VERSION"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ClaudePet.xcodeproj \
            -scheme ClaudePet \
            -derivedDataPath build

      - name: Build app
        run: |
          # CODE_SIGNING_ALLOWED=NO л•Љ м†Ьк±∞нХШк≥† Ad Hoc мДЬл™Е(-) м†БмЪ©
          # SparkleмЭШ Autoupdate нЧђнНЉ л∞ФмЭілДИл¶ђлПД мДЬл™ЕлРШмЦімХЉ macOSк∞А мД§мєШл•Љ нЧИмЪ©нХ®
          xcodebuild clean build \
            -project ClaudePet.xcodeproj \
            -scheme ClaudePet \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Locate built app
        id: app
        run: |
          APP_PATH=$(find build/Build/Products/Release -name "ClaudePet.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "вЭМ ClaudePet.app not found"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "вЬЕ Found app at: $APP_PATH"

      - name: Create ZIP with ditto
        run: |
          ditto -c -k --keepParent \
            "${{ steps.app.outputs.app_path }}" \
            "ClaudePet.zip"
          echo "рЯУ¶ ZIP created"
          ls -lh ClaudePet.zip

      - name: Locate sign_update binary
        id: signtool
        run: |
          SIGN_UPDATE=$(find build -name "sign_update" -type f -perm +111 2>/dev/null | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            # Fallback: SourcePackages мЧРмДЬ к≤АмГЙ
            SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SIGN_UPDATE" ]; then
            echo "вЭМ sign_update not found"
            exit 1
          fi
          echo "sign_update=$SIGN_UPDATE" >> $GITHUB_OUTPUT
          echo "рЯФС Found sign_update: $SIGN_UPDATE"

      - name: Sign ZIP with EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # лєДл∞АнВ§л•Љ мЮДмЛЬ нММмЭЉмЧР м†АмЮ• (кґМнХЬ м†ЬнХЬ)
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          # мДЬл™Е мЛ§нЦЙ
          SIGN_OUTPUT=$("${{ steps.signtool.outputs.sign_update }}" \
            -f "$KEY_FILE" \
            "ClaudePet.zip")

          # м¶ЙмЛЬ нВ§ нММмЭЉ мВ≠м†Ь
          rm -f "$KEY_FILE"

          echo "Sign output: $SIGN_OUTPUT"

          # edSignature мґФмґЬ
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"$//')
          FILE_LENGTH=$(stat -f%z "ClaudePet.zip")

          if [ -z "$ED_SIGNATURE" ]; then
            echo "вЭМ Failed to extract signature"
            exit 1
          fi

          echo "ed_signature=$ED_SIGNATURE" >> $GITHUB_OUTPUT
          echo "file_length=$FILE_LENGTH" >> $GITHUB_OUTPUT
          echo "вЬЕ Signed вАФ length: $FILE_LENGTH bytes"

      - name: Update appcast.xml
        run: |
          # --build мГЭлЮµ мЛЬ update_appcast.pyк∞А кЄ∞м°і лєМлУЬл≤ИнШЄ мµЬлМАк∞Т+1л°Ь мЮРлПЩ к≥ДмВ∞
          python3 scripts/update_appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --signature "${{ steps.sign.outputs.ed_signature }}" \
            --length "${{ steps.sign.outputs.file_length }}" \
            --appcast docs/appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudePet.zip
          tag_name: ${{ github.ref_name }}
          name: ClaudePet ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          if git diff --staged --quiet; then
            echo "вДєпЄП  No appcast changes to commit"
          else
            git commit -m "chore: update appcast for ${{ github.ref_name }}"
            git push origin HEAD:main
            echo "вЬЕ appcast.xml pushed"
          fi
