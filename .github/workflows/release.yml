name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️  Releasing version: $VERSION"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ClaudePet.xcodeproj \
            -scheme ClaudePet \
            -derivedDataPath build

      - name: Build app
        run: |
          xcodebuild clean build \
            -project ClaudePet.xcodeproj \
            -scheme ClaudePet \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Locate built app
        id: app
        run: |
          APP_PATH=$(find build/Build/Products/Release -name "ClaudePet.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ ClaudePet.app not found"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "✅ Found app at: $APP_PATH"

      - name: Create ZIP with ditto
        run: |
          ditto -c -k --keepParent \
            "${{ steps.app.outputs.app_path }}" \
            "ClaudePet.zip"
          echo "📦 ZIP created"
          ls -lh ClaudePet.zip

      - name: Locate sign_update binary
        id: signtool
        run: |
          SIGN_UPDATE=$(find build -name "sign_update" -type f -perm +111 2>/dev/null | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            # Fallback: SourcePackages 에서 검색
            SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SIGN_UPDATE" ]; then
            echo "❌ sign_update not found"
            exit 1
          fi
          echo "sign_update=$SIGN_UPDATE" >> $GITHUB_OUTPUT
          echo "🔑 Found sign_update: $SIGN_UPDATE"

      - name: Sign ZIP with EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 비밀키를 임시 파일에 저장 (권한 제한)
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          # 서명 실행
          SIGN_OUTPUT=$("${{ steps.signtool.outputs.sign_update }}" \
            -f "$KEY_FILE" \
            "ClaudePet.zip")

          # 즉시 키 파일 삭제
          rm -f "$KEY_FILE"

          echo "Sign output: $SIGN_OUTPUT"

          # edSignature 추출
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"$//')
          FILE_LENGTH=$(stat -f%z "ClaudePet.zip")

          if [ -z "$ED_SIGNATURE" ]; then
            echo "❌ Failed to extract signature"
            exit 1
          fi

          echo "ed_signature=$ED_SIGNATURE" >> $GITHUB_OUTPUT
          echo "file_length=$FILE_LENGTH" >> $GITHUB_OUTPUT
          echo "✅ Signed — length: $FILE_LENGTH bytes"

      - name: Update appcast.xml
        run: |
          # --build 생략 시 update_appcast.py가 기존 빌드번호 최대값+1로 자동 계산
          python3 scripts/update_appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --signature "${{ steps.sign.outputs.ed_signature }}" \
            --length "${{ steps.sign.outputs.file_length }}" \
            --appcast docs/appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudePet.zip
          tag_name: ${{ github.ref_name }}
          name: ClaudePet ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          if git diff --staged --quiet; then
            echo "ℹ️  No appcast changes to commit"
          else
            git commit -m "chore: update appcast for ${{ github.ref_name }}"
            git push origin HEAD:main
            echo "✅ appcast.xml pushed"
          fi
